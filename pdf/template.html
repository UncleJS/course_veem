<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veeam Backup &amp; Replication v12.x Course</title>
  <style>
    /* ─── Page Setup ─────────────────────────────────────────────────── */
    @page {
      size: A4;
      margin: 20mm 18mm 22mm 18mm;
      @bottom-center {
        content: counter(page);
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 9pt;
        color: #666;
      }
    }

    /* ─── Base Typography ────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      font-size: 10.5pt;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fff;
      margin: 0;
      padding: 0;
    }

    /* ─── Document Sections ──────────────────────────────────────────── */
    /* Every source .md file is wrapped in one of these.
       Each starts on a fresh page (except the very first). */
    .doc-section {
      break-before: page;
    }
    .doc-section:first-child {
      break-before: avoid;
    }

    /* Section dividers injected between major groups */
    .section-divider {
      break-before: page;
      break-after: page;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60mm;
      text-align: center;
    }
    .section-divider h2 {
      font-size: 22pt;
      color: #00bcd4;
      border: 3px solid #00bcd4;
      padding: 12px 32px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      break-after: avoid;
    }

    /* ─── Headings ───────────────────────────────────────────────────── */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-weight: 700;
      line-height: 1.25;
      margin-top: 1.4em;
      margin-bottom: 0.4em;
      /* Orphan prevention: never leave a heading stranded at page bottom */
      break-after: avoid;
      break-inside: avoid;
    }

    h1 {
      font-size: 20pt;
      color: #003d52;
      border-bottom: 2px solid #00bcd4;
      padding-bottom: 6px;
      margin-top: 0;
    }

    h2 {
      font-size: 14pt;
      color: #005a72;
      border-bottom: 1px solid #d0eef5;
      padding-bottom: 3px;
    }

    h3 {
      font-size: 12pt;
      color: #007a99;
    }

    h4 {
      font-size: 11pt;
      color: #1a1a1a;
    }

    h5, h6 {
      font-size: 10.5pt;
      color: #333;
    }

    /* ─── Paragraphs & Lists ─────────────────────────────────────────── */
    p {
      margin: 0 0 0.75em 0;
      orphans: 3;
      widows: 3;
    }

    ul, ol {
      margin: 0.4em 0 0.75em 0;
      padding-left: 1.6em;
    }

    li {
      margin-bottom: 0.2em;
      orphans: 2;
      widows: 2;
    }

    /* ─── Code ───────────────────────────────────────────────────────── */
    code {
      font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
      font-size: 0.88em;
      background: #f0f8fa;
      border: 1px solid #cce9f0;
      border-radius: 3px;
      padding: 1px 4px;
    }

    pre {
      font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
      font-size: 0.82em;
      background: #f4fbfd;
      border: 1px solid #b8dfe8;
      border-left: 4px solid #00bcd4;
      border-radius: 4px;
      padding: 10px 14px;
      margin: 0.8em 0;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      /* Keep code blocks together — no break in the middle */
      break-inside: avoid;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
    }

    /* ─── Blockquotes ────────────────────────────────────────────────── */
    blockquote {
      margin: 0.8em 0;
      padding: 8px 14px;
      border-left: 4px solid #00bcd4;
      background: #f0fbfe;
      color: #333;
      border-radius: 0 4px 4px 0;
      break-inside: avoid;
    }

    blockquote p {
      margin: 0.2em 0;
    }

    /* ─── Tables ─────────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.8em 0;
      font-size: 0.92em;
      break-inside: avoid;
    }

    thead {
      break-after: avoid;
    }

    th {
      background: #005a72;
      color: #fff;
      padding: 7px 10px;
      text-align: left;
      font-weight: 600;
    }

    td {
      padding: 6px 10px;
      border-bottom: 1px solid #d8eef4;
      vertical-align: top;
    }

    tr:nth-child(even) td {
      background: #f5fbfd;
    }

    /* ─── Horizontal Rules ───────────────────────────────────────────── */
    hr {
      border: none;
      border-top: 1px solid #cce9f0;
      margin: 1.5em 0;
    }

    /* ─── Links ──────────────────────────────────────────────────────── */
    a {
      color: #005a72;
      text-decoration: underline;
    }

    /* For screen / PDF viewer — internal anchors look clean */
    a[href^="#"] {
      color: #007a99;
      text-decoration: none;
      border-bottom: 1px dotted #007a99;
    }

    /* External links: append the URL in print so paper readers can see it */
    @media print {
      a[href^="http"]::after,
      a[href^="https"]::after {
        content: " (" attr(href) ")";
        font-size: 0.78em;
        color: #555;
        font-style: italic;
        word-break: break-all;
      }

      /* Don't append URL for badge images wrapped in links */
      a:has(img)::after {
        content: none !important;
      }
    }

    /* ─── Images (badges, diagrams) ──────────────────────────────────── */
    img {
      max-width: 100%;
      height: auto;
    }

    /* Badge images inline, small */
    .badges {
      margin-bottom: 0.8em;
    }

    .badges img {
      height: 20px;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* Mermaid diagrams — rendered SVG */
    .mermaid-diagram {
      display: block;
      margin: 1em auto;
      max-width: 100%;
      break-inside: avoid;
    }

    .mermaid-diagram svg {
      max-width: 100%;
      height: auto;
    }

    /* ─── Strong / Em ────────────────────────────────────────────────── */
    strong { color: #003d52; }

    /* ─── Metadata callout (the VMCE Objective > blockquotes) ────────── */
    .doc-section > blockquote:first-of-type {
      background: #e8f6fa;
      border-left-color: #005a72;
    }

    /* ─── "Go to TOC" links — de-emphasise in print ──────────────────── */
    a[href="#table-of-contents"],
    a[href*="table-of-contents"] {
      font-size: 0.82em;
      color: #888;
      border-bottom: none;
      text-decoration: none;
    }

    @media print {
      a[href="#table-of-contents"]::after,
      a[href*="table-of-contents"]::after {
        content: none !important;
      }
    }

    /* ─── Print-specific overrides ───────────────────────────────────── */
    @media print {
      body {
        font-size: 10pt;
      }

      .doc-section {
        break-before: page;
      }
      .doc-section:first-child {
        break-before: avoid;
      }
    }
  </style>
</head>
<body>
  <!--CONTENT-->
</body>
</html>
